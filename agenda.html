body{font-family:'Inter',sans-serif}h1,h2,h3{font-family:'Space Grotesk',sans-serif}

<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/nav.js"></script>
<script>
let currentDate = new Date();
let contacts = [];
let interactions = [];
let selectedDay = null;

const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS_FR = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];

async function loadData() {
  const token = Auth.getToken();
  const userId = Auth.getUserId();
  try {
    const contactsRes = await SupabaseClient.getContacts(token, userId);
    contacts = Array.isArray(contactsRes) ? contactsRes : [];
    if (!Array.isArray(contactsRes) && contactsRes.error) {
       console.error("Erreur contacts:", contactsRes.error);
    }
    const interactionsRes = await SupabaseClient.query(token, 'interactions', {
      order: 'created_at.desc'
    });
    interactions = Array.isArray(interactionsRes) ? interactionsRes : [];

    // Populate contact select
    const sel = document.getElementById('rdv-contact');
    sel.innerHTML = '<option value="">Choisir un prospect…</option>' +
      contacts.map(c => `<option value="${c.id}">${escHtml(c.nom || c.name || 'Sans nom')} — ${escHtml(c.ville || c.city || '')}</option>`).join('');
    renderCalendar();
    renderUpcoming();
    selectToday();
  } catch(e) { console.error(e); }
}


function getAgendaEvents() {
  if (!Array.isArray(contacts)) return [];
  return contacts.filter(c => c.date_relance);
}

function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  document.getElementById('month-label').textContent = `${MONTHS_FR[month]} ${year}`;

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDow = firstDay.getDay(); // 0=Sun
  // Adjust: Mon=0 ... Sun=6
  const offset = (startDow === 0) ? 6 : startDow - 1;

  const rdvMap = {};
  getAgendaEvents().forEach(c => {
    const d = c.date_relance?.slice(0,10);
    if (d) { if (!rdvMap[d]) rdvMap[d] = []; rdvMap[d].push(c); }
  });

  const today = new Date().toISOString().slice(0,10);
  let html = '';

  // Padding prev month
  for (let i = 0; i < offset; i++) {
    const d = new Date(year, month, 1 - (offset - i));
    html += `<div class="cal-day p-2 bg-surface-container-low/40 opacity-40"><span class="text-xs text-stone-400">${d.getDate()}</span></div>`;
  }

  for (let day = 1; day <= lastDay.getDate(); day++) {
    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = iso === today;
    const events = rdvMap[iso] || [];
    const isSelected = iso === selectedDay;
    html += `
      <div class="cal-day p-2 bg-surface-container-lowest cursor-pointer hover:bg-primary/5 transition-colors ${isSelected?'ring-2 ring-primary ring-inset':''}"
           onclick="selectDay('${iso}')">
        <span class="text-xs font-headline font-bold ${isToday?'w-6 h-6 rounded-full bg-primary text-white flex items-center justify-center':'text-on-surface'}">${day}</span>
        <div class="mt-1 space-y-0.5">
          ${events.slice(0,3).map(c => {
            const isRdv = (c.statut || c.status) === 'rdv_planifie';
            const isPast = !isRdv && isOverdue(c.date_relance);
            const cls = isRdv ? 'bg-primary/15 text-primary' : (isPast ? 'bg-red-500/15 text-red-700 font-bold' : 'bg-amber-500/15 text-amber-700');
            const name = c.nom || c.name || 'Sans nom';
            
            let displayTitle = name;
            if (!isRdv) {
              const lastRelance = interactions.find(i => i.contact_id === c.id && i.content && i.content.includes(c.date_relance));
              if (lastRelance) {
                const titleMatch = lastRelance.content.match(/\[(.*?)\]/);
                if (titleMatch) displayTitle = `${name} (${titleMatch[1]})`;
              }
            }
            
            return `<span class="cal-event ${cls}" title="${escHtml(displayTitle)}">${isRdv?'[RDV] ':'[REL] '}${escHtml(displayTitle)}</span>`;
          }).join('')}
          ${events.length > 3 ? `<span class="cal-event text-stone-400">+${events.length-3}</span>` : ''}
        </div>
      </div>
    `;
  }

  // Padding next month
  const totalCells = offset + lastDay.getDate();
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= remaining; i++) {
    html += `<div class="cal-day p-2 bg-surface-container-low/40 opacity-40"><span class="text-xs text-stone-400">${i}</span></div>`;
  }

  document.getElementById('calendar-grid').innerHTML = html;
}

function selectToday() {
  const today = new Date().toISOString().slice(0,10);
  selectDay(today);
}

function selectDay(iso) {
  selectedDay = iso;
  const d = new Date(iso + 'T12:00:00');
  document.getElementById('selected-date-label').textContent =
    `${DAYS_FR[d.getDay()]} ${d.getDate()} ${MONTHS_FR[d.getMonth()]} ${d.getFullYear()}`;

  const dayEvents = getAgendaEvents().filter(c => c.date_relance?.slice(0,10) === iso);
  const evList = document.getElementById('day-events');
  document.getElementById('selected-events-count').textContent = `${dayEvents.length} événement${dayEvents.length>1?'s':''}`;

  if (!dayEvents.length) {
    evList.innerHTML = '<p class="text-stone-300 text-sm text-center py-4">Aucun événement ce jour</p>';
  } else {
    evList.innerHTML = dayEvents.map(c => {
      const isRdv = (c.statut || c.status) === 'rdv_planifie';
      const colorCls = isRdv ? 'bg-primary' : 'bg-amber-500';
      const typeLabel = isRdv ? 'RDV Planifié' : 'Relance à faire';
      return `
      <div class="flex gap-3 items-start p-2 rounded-xl hover:bg-stone-50 transition-colors">
        <div class="w-5 h-5 rounded-full ${colorCls} flex items-center justify-center shrink-0 mt-0.5 ring-4 ring-white shadow-sm">
          <span class="material-symbols-outlined text-white" style="font-size:11px;font-variation-settings:'FILL' 1,'wght' 400">${isRdv?'calendar_today':'mail'}</span>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between gap-2">
            <p class="text-[10px] font-bold ${isRdv?'text-primary':'text-amber-600'} uppercase tracking-widest">${typeLabel}</p>
            <p class="text-[10px] text-stone-400 font-medium">${c.date_relance.slice(0,10)}</p>
          </div>
          <h3 class="font-bold text-sm text-on-surface truncate">${escHtml(c.nom || c.name || 'Sans nom')}</h3>
          ${(!isRdv && interactions.find(i => i.contact_id === c.id && i.content.includes(c.date_relance))) ? 
            `<p class="text-xs font-bold text-amber-700 mb-1 italic">${escHtml(interactions.find(i => i.contact_id === c.id && i.content.includes(c.date_relance)).content.match(/\[(.*?)\]/)?.[1] || 'Relance')}</p>` : ''
          }
          <p class="text-xs text-stone-500 mb-2">${escHtml(c.activite || c.activity || '')} · ${escHtml(c.ville || c.city || '')}</p>
          <div class="flex items-center gap-3">
            <a href="fiche.html?id=${c.id}" class="text-primary text-xs font-bold hover:underline flex items-center gap-1">
              <span class="material-symbols-outlined text-sm">visibility</span>Fiche contact
            </a>
            ${!isRdv ? `
              <a href="email-assistant.html?id=${c.id}" class="text-amber-600 text-xs font-bold hover:underline flex items-center gap-1">
                <span class="material-symbols-outlined text-sm">auto_awesome</span>Email IA
              </a>
            ` : ''}
          </div>
        </div>
      </div>`;
    }).join('<div class="h-px bg-stone-50 my-1"></div>');
  }

  renderCalendar();
}

function renderUpcoming() {
  const upcoming = getAgendaEvents()
    .filter(c => c.date_relance >= new Date().toISOString().slice(0,10))
    .sort((a,b) => a.date_relance.localeCompare(b.date_relance))
    .slice(0,5);

  const list = document.getElementById('upcoming-list');
  if (!upcoming.length) { list.innerHTML = '<p class="text-stone-300 text-xs text-center py-2">Aucun RDV à venir</p>'; return; }
  list.innerHTML = upcoming.map(c => {
    const rawDate = c.date_relance;
    const dObj = new Date(rawDate.includes('T') ? rawDate : rawDate + 'T12:00:00');
    const monthName = !isNaN(dObj.getTime()) ? MONTHS_FR[dObj.getMonth()] : '???';
    const dayNum = !isNaN(dObj.getTime()) ? dObj.getDate() : '??';
    const isoDay = rawDate.slice(0,10);
    
    return `
    <div class="flex items-center gap-3 cursor-pointer hover:bg-surface-container-low rounded-xl p-2 -mx-2 transition-colors" onclick="selectDay('${isoDay}')">
      <div class="shrink-0 w-10 h-10 rounded-xl bg-primary/10 flex flex-col items-center justify-center">
        <span class="text-[10px] font-bold text-primary uppercase">${monthName.slice(0,3)}</span>
        <span class="text-base font-bold text-primary leading-none">${dayNum}</span>
      </div>
      <div class="min-w-0">
        <p class="font-bold text-sm truncate">${escHtml(c.nom || c.name || 'Sans nom')}</p>
        <p class="text-xs text-stone-400 truncate">${escHtml(c.activite || c.activity || '')} · ${escHtml(c.ville || c.city || '')}</p>
      </div>
    </div>
  `;
  }).join('');
}

document.getElementById('prev-month').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); });
document.getElementById('next-month').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); });
document.getElementById('today-btn').addEventListener('click', () => { currentDate = new Date(); renderCalendar(); selectToday(); });

document.getElementById('btn-new-rdv').addEventListener('click', () => {
  document.getElementById('rdv-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('rdv-modal').style.display = 'flex';
});

document.getElementById('rdv-confirm-btn').addEventListener('click', async () => {
  const contactId = document.getElementById('rdv-contact').value;
  const date = document.getElementById('rdv-date').value;
  const time = document.getElementById('rdv-time').value;
  const timeEnd = document.getElementById('rdv-time-end').value;
  const location = document.getElementById('rdv-location').value;
  const commercial = document.getElementById('rdv-commercial').value;
  const note = document.getElementById('rdv-note').value;

  if (!contactId || !date || !time || !timeEnd) { showToast('Contact, date, début et fin requis', 'error'); return; }

  const btn = document.getElementById('rdv-confirm-btn');
  btn.disabled = true;
  btn.textContent = 'Synchronisation...';

  try {
    const payload = {
      contact_id: contactId,
      date_rdv: date,
      heure_debut: time,
      heure_fin: timeEnd,
      lieu: location,
      lien_visio: location.startsWith('http') ? location : '',
      commercial_id: commercial
    };

    console.log('📡 Envoi au webhook n8n (Agenda):', payload);
    const response = await fetch('https://lsangouard.app.n8n.cloud/webhook/valider-rdv', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const result = await response.json();

    if (result.success) {
      await SupabaseClient.updateContactStatus(Auth.getToken(), contactId, 'rdv_planifie', {date_relance: date});
      await SupabaseClient.insertInteraction(Auth.getToken(), {
        contact_id: contactId,
        type: 'rdv',
        content: `RDV Validé (Agenda) : ${date} (${time}-${timeEnd}) - Lieu: ${location}. ${note}`
      });
      document.getElementById('rdv-modal').style.display = 'none';
      showToast('RDV créé et synchronisé !', 'success');
      loadData();
    } else {
      throw new Error(result.message || 'Erreur n8n');
    }
  } catch(e) {
    showToast('Erreur: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Confirmer le RDV';
  }
});

document.getElementById('rdv-modal').addEventListener('click', function(e){ if(e.target===this) this.style.display='none'; });

document.addEventListener('DOMContentLoaded', loadData);
</script>
</body></html>
