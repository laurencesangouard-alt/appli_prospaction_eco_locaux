<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProspAction – Eco Locaux | Connexion</title>
  <meta name="description" content="Plateforme de prospection commerciale automatisée pour Eco Locaux." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6BA43A',
            'primary-container': '#72bf44',
            'primary-fixed': '#a6f875',
            'on-primary': '#ffffff',
            'on-primary-container': '#1d4a00',
            surface: '#fbf9f8',
            'surface-container-low': '#f5f3f3',
            'surface-container': '#efeded',
            'on-surface': '#1b1c1c',
            'on-surface-variant': '#414939',
            error: '#ba1a1a',
            'error-container': '#ffdad6',
          },
          fontFamily: {
            headline: ['Space Grotesk'],
            body: ['Inter'],
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-headline { font-family: 'Space Grotesk', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    .glass-card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .bg-hero {
      background: linear-gradient(135deg, #0a1f00 0%, #1a4500 40%, #6BA43A 70%, #72bf44 100%);
    }
    .btn-primary {
      background: linear-gradient(135deg, #6BA43A, #72bf44);
      transition: all 0.2s;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(107,164,58,0.35); }
    .btn-primary:active { transform: translateY(0); }
    .field-input:focus { outline: none; box-shadow: 0 0 0 2px rgba(107,164,58,0.25); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.5s ease forwards; }
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(2deg); }
    }
    .float-1 { animation: float 6s ease-in-out infinite; }
    .float-2 { animation: float 8s ease-in-out infinite 1s; }
    .float-3 { animation: float 7s ease-in-out infinite 2s; }
  </style>
</head>
<body class="login-page bg-surface font-body text-on-surface antialiased">

  <!-- Header / Nav -->
  <header class="glass-nav" id="topnav">
    <div class="topnav-inner">
      <a href="index.html" class="nav-brand">
        <div class="brand-icon-sm">
          <svg width="20" height="20" viewBox="0 0 32 32" fill="none">
            <path d="M16 2L4 8v8c0 7.73 5.14 14.96 12 16.93C22.86 30.96 28 23.73 28 16V8L16 2z" fill="white"/>
            <path d="M11 16l3 3 7-7" stroke="#6BA43A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="nav-brand-name">ECO LOCAUX</span>
      </a>
      <div class="nav-links">
        <a class="nav-link" href="optimisation.html">Recherche</a>
        <a class="nav-link" href="contacts.html">Contacts</a>
        <a class="nav-link" href="email-assistant.html">Email IA</a>
        <a class="nav-link" href="kanban.html">Pipeline</a>
        <a class="nav-link" href="agenda.html">Agenda</a>
      </div>
      <div class="nav-user">
        <a href="index.html" class="btn btn-primary" style="padding: 6px 16px; font-size: 0.75rem;">Connexion</a>
      </div>
    </div>
  </header>

  <main class="min-h-screen bg-hero relative flex items-center justify-center pt-16">
    <!-- Floating decorative blobs -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="float-1 absolute top-[-10%] left-[-5%] w-80 h-80 rounded-full opacity-20" style="background: radial-gradient(circle, #72bf44, transparent);"></div>
      <div class="float-2 absolute bottom-[-15%] right-[-10%] w-96 h-96 rounded-full opacity-15" style="background: radial-gradient(circle, #a6f875, transparent);"></div>
      <!-- Grid pattern -->
      <div class="absolute inset-0 opacity-5" style="background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 60px 60px;"></div>
    </div>

    <div class="relative z-10 w-full max-w-md mx-auto px-4 py-12">
      <div class="glass-card rounded-3xl shadow-2xl overflow-hidden fade-up">

        <!-- Header band -->
        <div class="px-8 pt-10 pb-6 text-center" style="background: linear-gradient(135deg, rgba(107,164,58,0.08), rgba(114,191,68,0.05));">
          <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4" style="background: linear-gradient(135deg, #6BA43A, #72bf44);">
            <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
              <path d="M16 2L4 8v8c0 7.73 5.14 14.96 12 16.93C22.86 30.96 28 23.73 28 16V8L16 2z" fill="rgba(255,255,255,0.9)"/>
              <path d="M11 16l3 3 7-7" stroke="#6BA43A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h1 class="text-2xl font-headline font-bold text-on-surface tracking-tight">ProspAction</h1>
          <p class="text-sm text-on-surface-variant mt-1">Eco Locaux · Prospection automatisée</p>
        </div>

        <!-- Form -->
        <div class="px-8 pb-10 pt-4">
          <div id="auth-alert" class="hidden mb-4 px-4 py-3 rounded-xl flex items-center gap-3 text-sm font-medium">
            <span class="material-symbols-outlined text-lg">error</span>
            <span id="auth-alert-msg"></span>
          </div>

          <form id="login-form" novalidate class="space-y-4">
            <div>
              <label for="email" class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Email</label>
              <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 text-xl">mail</span>
                <input type="email" id="email" name="email"
                  class="field-input w-full bg-surface-container-low border border-stone-200 rounded-xl pl-10 pr-4 py-3 text-on-surface text-sm transition-all"
                  placeholder="vous@ecolocaux.fr" autocomplete="email" required />
              </div>
            </div>

            <div>
              <div class="flex justify-between items-center mb-2">
                <label for="password" class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider">Mot de passe</label>
                <a href="#" id="forgot-password" class="text-[10px] font-semibold text-primary hover:underline uppercase tracking-wider">Mot de passe oublié ?</a>
              </div>
              <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 text-xl">lock</span>
                <input type="password" id="password" name="password"
                  class="field-input w-full bg-surface-container-low border border-stone-200 rounded-xl pl-10 pr-12 py-3 text-on-surface text-sm transition-all"
                  placeholder="••••••••" autocomplete="current-password" required />
                <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-600 transition-colors">
                  <span class="material-symbols-outlined text-xl" id="eye-icon">visibility</span>
                </button>
              </div>
            </div>

            <button type="submit" id="login-btn"
              class="btn-primary w-full text-white font-headline font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 text-sm uppercase tracking-widest mt-2">
              <span id="login-btn-text">Se connecter</span>
              <svg id="login-spinner" class="spinner hidden w-4 h-4" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="6" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
                <path d="M8 2a6 6 0 0 1 6 6" stroke="white" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </form>

          <p class="text-center text-xs text-stone-400 mt-6">ProspAction v1.0 — Eco Locaux © 2026</p>
        </div>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>

  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
